version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: procreditapp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: procreditapp_db
      MYSQL_USER: procreditapp
      MYSQL_PASSWORD: procreditapp_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: procreditapp-backend
    restart: always
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://procreditapp:procreditapp_password@mysql:3306/procreditapp_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRATION: 7d
      PORT: 3000
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mysql_data:
