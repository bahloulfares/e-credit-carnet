<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Gradient définition -->
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond vert (crédit/épicerie) -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="100"/>

  <!-- Cercle principal (pièce d'argent) -->
  <circle cx="256" cy="256" r="180" fill="url(#coinGradient)" stroke="#DAA520" stroke-width="8"/>

  <!-- Ombre pièce -->
  <circle cx="256" cy="260" r="180" fill="#000000" opacity="0.1"/>

  <!-- Détails pièce (relief) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#FFF" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.7"/>

  <!-- Texte "$" (signe dollar) -->
  <g transform="translate(256, 256)">
    <text x="0" y="70" font-size="140" font-weight="bold" fill="#FFF" text-anchor="middle" font-family="Arial, sans-serif" stroke="#666" stroke-width="2">
      $
    </text>
  </g>

  <!-- Traits de bord (pour effet de pièce) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#C0A000" stroke-width="2" opacity="0.8" stroke-dasharray="10,5"/>
</svg>
